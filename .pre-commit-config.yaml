# See https://pre-commit.com and PLAN.md §5.
# Install with: pip install -e ".[dev]" && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
      - id: mypy
        pass_filenames: false
        args: [adaptron/core]
