# CI per PLAN.md §5 — core checks, bridge suite, dependency isolation.
name: CI

"on":
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install bare package + dev tooling
        run: |
          python -m pip install --upgrade pip
          # No langchain/crewai extras — core stays dependency-free.
          python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy adaptron/core

      - name: Pytest
        run: python -m pytest

  bridge-tests:
    name: Bridge tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with bridge extras + dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[langchain,crewai,dev]"

      - name: Run bridge tests
        run: python -m pytest tests/test_bridges_*.py

  dependency-isolation:
    name: Dependency isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bare package (no extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Assert langchain and crewai are absent
        run: |
          python - <<'PY'
          import importlib.util
          import sys

          missing_ok = ("langchain", "crewai")
          present = [name for name in missing_ok if importlib.util.find_spec(name) is not None]
          if present:
              print(
                  "Dependency isolation failed: bare `pip install -e .` pulled in:",
                  ", ".join(present),
                  file=sys.stderr,
              )
              sys.exit(1)
          print("OK: langchain and crewai are absent after bare install.")
          PY
